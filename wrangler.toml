name = "openwallet-mcp"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[vars]
OPENWALLET_API_URL = "https://api.openwallet.vn"

# Secrets — set via: wrangler secret put MCP_API_KEY
#                    wrangler secret put OPENWALLET_API_KEY

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OpenWalletMCP"]

[durable_objects]
bindings = [{ class_name = "OpenWalletMCP", name = "MCP_OBJECT" }]

[observability.logs]
enabled = true
invocation_logs = true