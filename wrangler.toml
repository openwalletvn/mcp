name = "openwallet-mcp"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8001

[vars]
OPENWALLET_API_URL = "https://api.openwallet.vn"
LANGFUSE_PUBLIC_KEY = "pk-lf-513953f1-55b1-4f1d-9714-0a1fd7a816d6"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"

# Secrets — set via: wrangler secret put MCP_KEYS        (JSON array of key objects)
#                    wrangler secret put OPENWALLET_API_KEY
#                    wrangler secret put LANGFUSE_SECRET_KEY

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "mcp_usage"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OpenWalletMCP"]

[durable_objects]
bindings = [{ class_name = "OpenWalletMCP", name = "MCP_OBJECT" }]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1